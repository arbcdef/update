<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order</title>
</head>
<body>
  <h1>Order Pesanan</h1>

  <form action="">
    <div>
      <label for="nama">Nama Pemesan</label>
      <input type="text" id="nama">
    </div>

    <div>
      <label for="menu">Pilih Menu</label>
      <select name="menu" id="menu">
        <option value="NG">Nasi Goreng</option>
        <option value="MG">Mie Goreng</option>
        <option value="AB">Ayam Bakar</option>
      </select>
    </div>

    <div>
      <label for="topping">Topping</label>
      <input type="checkbox" name="topping" id="telur">
      <label for="telur">Telur</label>
      <input type="checkbox" name="topping" id="keju">
      <label for="keju">Keju</label>
      <input type="checkbox" name="topping" id="kerupuk">
      <label for="kerupuk">Kerupuk</label>
    </div>

    <div>
      <label for="lvl">Level Pedas</label>
      <input type="radio" name="lvl" id="pedas">
      <label for="pedas">Pedas</label>
      <input type="radio" name="lvl" id="sedang">
      <label for="sedang">Sedang</label>
      <input type="radio" name="lvl" id="tidak">
      <label for="tidak">Tidak Pedas</label>
    </div>

    <button type="submit">Pesan Sekarang</button>
  </form>
  
</body>
</html>
