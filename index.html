<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulir HIMA-SI</title>
  </head>
  <body>
    <h1>Formulir Anggota HIMA-SI</h1>
    <form action="">
      <div>
        <label for="nama">Nama Lengkap</label>
        <input type="text" id="nama" />
        <label for="NIM">NIM</label>
        <input type="text" id="NIM" />
      </div>

      <div>
        <label for="pw">Password Akun</label>
        <input type="password" id="pw" required />
      </div>

      <br /><br />

      <div>
        <label for="Pk">Pilih Konsentrasi</label><br />
        <select name="Pk" id="Pk">
          <option value="wd">Web Developer</option>
          <option value="md">Mobile Developer</option>
          <option value="da">Data Analyst</option>
        </select>
      </div>

      <br /><br />

      <div>
        <label for="anggota">Anggota Aktif</label>
        <br />
        <label for="aktif">Ya</label>
        <input type="radio" name="aktif" id="anggota" />
        <label for="off">Tidak</label>
        <input type="radio" name="off" id="anggota" />
      </div>

      <br /><br />

      <div>
        <label for="">Divisi yang Diminati</label>
        <br />
        <label for="Pen">Pendidikan</label>
        <input type="checkbox" id="Pen" />
        <label for="SO">Seni dan Olahraga</label>
        <input type="checkbox" id="SO" />
        <label for="HL">Hubungan Luar</label>
        <input type="checkbox" id="HL" />
      </div>

      <button type="submit">Simpan Data Anggota</button>
    </form>
  </body>
</html>
