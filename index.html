<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formuli</title>
</head>
<body>
  <h1>Formulir Beasiswa Prestasi</h1>

  <form action="">
    <div>
      <label for="nama">Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Nama seuai KTM" required>
      <label for="nim">NIM</label>
      <input type="number" id="nim" maxlength="6" placeholder="10525060">
    </div>

    <div>
      <label for="email">Email Mahasiswa</label>
      <input type="email" id="email" required>
      <label for="pw">Password Akun</label>
      <input type="password" id="pw" minlength="6" required>
    </div>

    <div>
    <label for="ipk">IPK Terakhir</label>
    <input type="number" step="0.01">
    </div>

    <div>
      <label for="prodi">Program Studi</label>
      <select name="prodi" id="prodi">
        <option value="si">Sistem Informasi</option>
        <option value="if">Teknik Informatika</option>
        <option value="mi">Manajemen Informatika</option>
      </select>
    </div>

    <div>
      <input type="checkbox" id="pernyataan" required>
      <label for="pernyataan">Saya menyatakan data ini benar</label>
    </div>

    <button type="submit">Ajukan Beasiswa</button>
  </form>
  
</body>
</html>
