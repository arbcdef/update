<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Praktikum</title>
</head>
<body>
  <form action="">
    <div>
      <label for="nama">Nama Lengkap</label>
      <input type="text" id="nama"><br>
      <label for="nim">NIM</label>
      <input type="text" id="nim"><br>
      <label for="pw">Password</label>
      <input type="password" id="pw" required><br>
      <br><br>
    </div>

    <div>
      <label for="Praktikum">Pemilihan Praktikum</label>
      <select name="Praktikum" id="Praktikum">
        <option value="al">Algoritma</option>
        <option value="sd">Struktur Data</option>
        <option value="bd">Basis Data</option>
      </select>
      <br><br>
    </div>

    <div>
      <input type="radio" id="on" name="metode" value="online">
      <label for="on">Online</label>

      <input type="radio" id="off" name="metode" value="offline">
      <label for="off">Offline</label>
    </div>
    <br><br>
  </form>

  <button type="submit">Daftar Praktikum</button>
  
</body>
</html>
