<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulir</title>
  </head>
  <body>
    <h1>Formulir Pendaftaran Rental Kamera</h1>

    <form action="">
      <div>
        <label for="nama">Nama Penyewa</label>
        <input type="text" id="nama" />
      </div>

      <div>
        <label for="list">Pilihan Kamera</label>
        <select name="list" id="list">
          <option value="sony1">Sony A7IV</option>
          <option value="sony2">Sony A6400</option>
          <option value="lumix">Lumix S5</option>
        </select>
      </div>

      <div>
        <label for="">Jenis Kamera</label>
        <input type="checkbox" id="35" />
        <label for="35">35mm Prime</label>
        <input type="checkbox" id="24" />
        <label for="24">24-70mm Zoom</label>
        <input type="checkbox" id="85" />
        <label for="85">85mm Portrait</label>
      </div>

      <div>
        <label for="">Durasi Sewa</label>
        <input type="radio" id="12" />
        <label for="12">12 Jam</label>
        <input type="radio" id="24" />
        <label for="24">24 Jam</label>
      </div>

      <div>
        <label for="KB">Kondisi Barang Saat Diterima</label>
        <textarea name="Kondisi" id="KB"></textarea>
      </div>

      <button type="submit">Konfirmasi Sewa Kamera</button>
    </form>
  </body>
</html>
